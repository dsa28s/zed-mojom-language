name: Release Mojom LSP Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub release tag to create or update.
        required: true
        default: mojom-lsp-v0.1.2

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: mojom-lsp-aarch64-apple-darwin.tar.gz
            archive: tar
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: mojom-lsp-x86_64-apple-darwin.tar.gz
            archive: tar
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset: mojom-lsp-aarch64-pc-windows-msvc.zip
            archive: zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: mojom-lsp-x86_64-pc-windows-msvc.zip
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build mojom-lsp
        run: cargo build --manifest-path lsp/mojom-lsp/Cargo.toml --locked --release --target "${{ matrix.target }}" --bin mojom-lsp

      - name: Archive macOS binary
        if: matrix.archive == 'tar'
        run: tar -czf "${{ matrix.asset }}" -C "lsp/mojom-lsp/target/${{ matrix.target }}/release" mojom-lsp

      - name: Archive Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "lsp/mojom-lsp/target/${{ matrix.target }}/release/mojom-lsp.exe" -DestinationPath "${{ matrix.asset }}" -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: ${{ matrix.asset }}
